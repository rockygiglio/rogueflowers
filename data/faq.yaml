- q: "What's your minimum for events?"
  a: "Our full-service event minimum is $6,500 for in-region productions, scaling with guest count, install scope, and venue logistics. We also offer à la carte centerpiece and personals packages starting at $1,200 for smaller gatherings."
  open: true
- q: "Do you travel?"
  a: "Yes — we regularly travel within a 200-mile radius and take a small number of destination events each year. Travel and lodging are quoted transparently and never marked up."
- q: "Can we keep flowers seasonal and locally sourced?"
  a: "Always our first preference. We work with regional growers from April through October, and supplement with thoughtful imports off-season. We'll be honest about what's actually in season versus what's been refrigerated for a month."
- q: "How does the restaurant program work?"
  a: "Standing weekly or bi-weekly delivery on a season-long contract. We provide the vessels, swap them on rotation, and adjust the palette as the season changes. Most restaurant accounts run between $180 and $900 per delivery."
- q: "What kinds of corporate events do you take on?"
  a: "Gala dinners, brand activations, conference welcome receptions, holiday parties, milestone anniversaries, and ongoing office or lobby programs. We work with planners and producers as easily as we work direct."
