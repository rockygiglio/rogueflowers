- n: "i."
  title: "Inquire"
  body: "Send the brief — date, venue, guest count, vibe board if you have one. We respond within two business days."
  when: "Day 0 — 2"
- n: "ii."
  title: "Consult"
  body: "A 60-minute call or in-studio meeting. We talk palette, scale, restraint, and budget honestly."
  when: "Week 1"
- n: "iii."
  title: "Propose"
  body: "Itemized proposal with mood, varietals by season, vessels, and a fixed all-in cost. One revision included."
  when: "Week 2 — 3"
- n: "iv."
  title: "Execute"
  body: "Sourcing, conditioning, build, install, and strike. We are on-site from first stem to last candle."
  when: "Event day"
