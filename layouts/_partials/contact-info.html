{{ with .Site.Params.contact }}
<ul class="contact-list">
  <li>{{ .street }}</li>
  <li>{{ .city }}, {{ .state }} {{ .zip }}</li>
  <li>{{ $.Site.Params.contact.hours }}</li>
  <li><a href="mailto:{{ .email }}">{{ .email }}</a></li>
  <li><a href="tel:{{ .phone }}">{{ .phone }}</a></li>
</ul>
{{ end }}
