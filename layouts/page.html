{{ define "main" }}

      <div>
        <div class="sec-eyebrow">{{ .Title }}</div>
        <h2>{{ .Title }}</h2>
      </div>
      <p>{{ .Description }}</p>

    <div class="content">
      {{ .Content }}
    </div>
  </div>
</section>
{{ end }}
